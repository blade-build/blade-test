---
# Cross-repo smoke for this workspace: run the full //suites/... against
# the sibling blade-build@master HEAD. This is the mirror of blade-build's own
# e2e-smoke job (which clones blade-test@master as a sibling); together
# the two sides pin the contract from both directions, each against the other's
# HEAD:
#
#   blade-build PR  -> e2e-smoke clones blade-test@master -> builds suites
#   blade-test PR   -> this job clones blade-build@master  -> builds suites
#
# Tracking master (not a frozen release tag) is deliberate: the suites are test
# fixtures for the blade *under development*, so they must validate against
# current blade -- otherwise a suite exercising an unreleased fix can never go
# green, and blade-test's own BLADE_ROOT (which uses post-release config like
# cc_toolchain_config) fails to even load on an old pinned blade. A "does the
# last RELEASE still build the suites" check, if wanted, belongs in a separate
# non-blocking scheduled job, not this PR gate.
#
# Keep the host setup steps in sync with
# blade-build/.github/workflows/python-package.yml :: e2e-smoke. The only
# additions here are:
#   * actions/setup-java (java_basic needs a JDK; ubuntu-22.04 has OpenJDK
#     preinstalled but we pin explicitly so the suite isn't at the mercy
#     of runner image changes)
#   * no Maven install: //thirdparty/junit vendors junit-4.13.2.jar and
#     hamcrest-core-1.3.jar as prebuilt jars.

name: Suites smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  suites:
    name: Suites smoke (blade-build master)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout blade-test
        uses: actions/checkout@v6
        with:
          path: blade-test

      - name: Checkout blade-build (sibling, master)
        uses: actions/checkout@v6
        with:
          repository: blade-build/blade-build
          ref: master
          path: blade-build

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install e2e toolchain (flex/bison/protoc)
        # Pre-install toolchains that upcoming suites migrated from
        # blade-build/example/ will need: lex_yacc -> flex + bison,
        # proto_basic -> protoc + libprotobuf-dev, py_proto ->
        # python3-protobuf at runtime. Idempotent no-ops for suites
        # that don't consume them. Kept in sync with blade-build's
        # e2e-smoke job to avoid drift.
        run: |
          sudo apt-get install -y flex bison protobuf-compiler libprotobuf-dev python3-protobuf

      - name: Show toolchain versions
        run: |
          python3 --version
          javac -version
          java -version
          ninja --version
          protoc --version

      - name: Run blade-test suites
        working-directory: blade-test
        run: |
          # CUDA toolkit not available on CI — skip cu_basic (mirrors
          # blade-build e2e-smoke). vcpkg_basic has its own dedicated jobs
          # (below); excluding it here keeps this job (and the mirrored
          # e2e-smoke) free of any vcpkg install.
          ./blade.sh test //suites/... \
            --exclude-targets '//suites/cu_basic/...,//suites/vcpkg_basic/...'

  # Native vcpkg integration (//suites/vcpkg_basic). Separate job because it is
  # gated on $VCPKG_ROOT (so it stays out of the shared //suites/... run above
  # and blade-build's e2e-smoke) and because installing real ports (fmt, gflags,
  # glog, openssl) wants its own binary-archive cache. GitHub-hosted runners
  # ship a bootstrapped vcpkg at $VCPKG_INSTALLATION_ROOT.
  vcpkg:
    name: vcpkg suite (native vcpkg# ports)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout blade-test
        uses: actions/checkout@v6
        with:
          path: blade-test

      - name: Checkout blade-build (sibling, master)
        uses: actions/checkout@v6
        with:
          repository: blade-build/blade-build
          ref: master
          path: blade-build

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Cache vcpkg binary archives
        # blade uses vcpkg's default local binary cache (~/.cache/vcpkg/archives);
        # persist it so the cold build of openssl/glog is paid once. Keyed on the
        # package set in BLADE_ROOT so it invalidates when that changes.
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-archives-${{ runner.os }}-${{ hashFiles('blade-test/BLADE_ROOT') }}
          restore-keys: |
            vcpkg-archives-${{ runner.os }}-

      - name: Run vcpkg suite
        working-directory: blade-test
        run: |
          # Enable the vcpkg suite by pointing blade at the runner's vcpkg.
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          echo "Using VCPKG_ROOT=$VCPKG_ROOT"
          "$VCPKG_ROOT/vcpkg" version | head -1 || true
          ./blade.sh test //suites/vcpkg_basic/...

  # Same vcpkg suite on Windows / MSVC -- exercises the native MSVC vcpkg path
  # (vcpkg's own toolchain for ports + cl.exe for the test). MSVC env comes from
  # msvc-dev-cmd; blade is invoked via blade.bat (python src) from the sibling
  # checkout, mirroring setup.bat.
  vcpkg-windows:
    name: vcpkg suite (Windows MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout blade-test
        uses: actions/checkout@v6
        with:
          path: blade-test

      - name: Checkout blade-build (sibling, master)
        uses: actions/checkout@v6
        with:
          repository: blade-build/blade-build
          ref: master
          path: blade-build

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ninja
        run: python -m pip install ninja

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-archives-${{ runner.os }}-${{ hashFiles('blade-test/BLADE_ROOT') }}
          restore-keys: |
            vcpkg-archives-${{ runner.os }}-

      - name: Run vcpkg suite
        working-directory: blade-test
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          Write-Host "Using VCPKG_ROOT=$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\vcpkg.exe" version
          ..\blade-build\blade.bat test '//suites/vcpkg_basic/...'
