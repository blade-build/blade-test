---
# Cross-repo smoke for this workspace: run the full //suites/... against
# the sibling blade-build@master HEAD. This is the mirror of blade-build's own
# e2e-smoke job (which clones blade-test@master as a sibling); together
# the two sides pin the contract from both directions, each against the other's
# HEAD:
#
#   blade-build PR  -> e2e-smoke clones blade-test@master -> builds suites
#   blade-test PR   -> this job clones blade-build@master  -> builds suites
#
# Tracking master (not a frozen release tag) is deliberate: the suites are test
# fixtures for the blade *under development*, so they must validate against
# current blade -- otherwise a suite exercising an unreleased fix can never go
# green, and blade-test's own BLADE_ROOT (which uses post-release config like
# cc_toolchain_config) fails to even load on an old pinned blade. A "does the
# last RELEASE still build the suites" check, if wanted, belongs in a separate
# non-blocking scheduled job, not this PR gate.
#
# Keep the host setup steps in sync with
# blade-build/.github/workflows/python-package.yml :: e2e-smoke. The only
# additions here are:
#   * actions/setup-java (java_basic needs a JDK; ubuntu-22.04 has OpenJDK
#     preinstalled but we pin explicitly so the suite isn't at the mercy
#     of runner image changes)
#   * no Maven install: //thirdparty/junit vendors junit-4.13.2.jar and
#     hamcrest-core-1.3.jar as prebuilt jars.

name: Suites smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  suites:
    name: Suites smoke (blade-build master)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout blade-test
        uses: actions/checkout@v6
        with:
          path: blade-test

      - name: Checkout blade-build (sibling, master)
        uses: actions/checkout@v6
        with:
          repository: blade-build/blade-build
          ref: master
          path: blade-build

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install e2e toolchain (flex/bison/protoc)
        # Pre-install toolchains that upcoming suites migrated from
        # blade-build/example/ will need: lex_yacc -> flex + bison,
        # proto_basic -> protoc + libprotobuf-dev, py_proto ->
        # python3-protobuf at runtime. Idempotent no-ops for suites
        # that don't consume them. Kept in sync with blade-build's
        # e2e-smoke job to avoid drift.
        run: |
          sudo apt-get install -y flex bison protobuf-compiler libprotobuf-dev python3-protobuf

      - name: Show toolchain versions
        run: |
          python3 --version
          javac -version
          java -version
          ninja --version
          protoc --version

      - name: Run blade-test suites
        working-directory: blade-test
        run: |
          # CUDA toolkit not available on CI — skip cu_basic (mirrors
          # blade-build e2e-smoke).
          ./blade.sh test //suites/... --exclude-targets '//suites/cu_basic/...'
